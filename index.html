<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>청첩장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #fdf6f0;
  --petal-1:   #f2c4ce; /* 연분홍 */
  --petal-2:   #e8a4b8; /* 장미핑크 */
  --petal-3:   #d4789a; /* 딥로즈 */
  --petal-4:   #f7e6d3; /* 피치 */
  --green:     #7a9e7e; /* 잎사귀 */
  --green-dk:  #4a6e4e;
  --ink:       #2d1f26;
  --ink-mid:   #6b4f5a;
  --ink-light: #b08898;
  --line:      #f0d5de;
  --gold:      #c9956a;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: #e8d5d0;
  font-family: 'Noto Serif KR', serif;
  color: var(--ink);
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
}

.page { background: var(--bg); position: relative; }

/* ── SVG 꽃 장식 공통 ── */
.floral-top, .floral-bottom {
  width: 100%;
  overflow: hidden;
  line-height: 0;
  display: block;
}

/* ================================================
   COVER
================================================ */
.cover {
  position: relative;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px 80px;
  overflow: hidden;
  background: linear-gradient(175deg, #fce8ef 0%, #fdf6f0 60%, #f9ede3 100%);
}

/* 배경 커버 사진 */
.cover-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.55) saturate(0.8);
}
.cover-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(253,230,240,0.5) 0%, rgba(253,246,240,0.7) 100%);
}
.cover-placeholder {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #fce8ef 0%, #f7d6e0 50%, #f9ede3 100%);
}

/* 코너 꽃장식 */
.corner-flower {
  position: absolute;
  width: 160px;
  height: 160px;
  pointer-events: none;
  z-index: 1;
}
.corner-flower.tl { top: 0; left: 0; }
.corner-flower.tr { top: 0; right: 0; transform: scaleX(-1); }
.corner-flower.bl { bottom: 0; left: 0; transform: scaleY(-1); }
.corner-flower.br { bottom: 0; right: 0; transform: scale(-1); }

/* 커버 콘텐츠 */
.cover-content {
  position: relative;
  z-index: 2;
}
.cover-pre {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 5px;
  color: var(--petal-3);
  margin-bottom: 20px;
  text-transform: uppercase;
}
.cover-names {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  font-weight: 400;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 6px;
}
.cover-amp {
  display: block;
  font-style: italic;
  font-size: 32px;
  color: var(--petal-3);
  margin: 2px 0;
}
.cover-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px auto; max-width: 220px;
}
.cover-divider::before, .cover-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, var(--petal-2), transparent);
}
.cover-divider span { color: var(--petal-2); font-size: 16px; }
.cover-date {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--ink-mid);
  line-height: 2;
}

/* 꽃잎 떨어지는 애니메이션 */
.petal {
  position: absolute;
  pointer-events: none;
  z-index: 1;
  animation: petalFall linear infinite;
  opacity: 0;
}
@keyframes petalFall {
  0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(110svh) rotate(360deg); }
}

.scroll-hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 3; text-align: center;
}
.scroll-hint p {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 11px; letter-spacing: 3px; color: var(--ink-light); margin-bottom: 8px;
}
.scroll-hint .line {
  display: block; width: 1px; height: 36px;
  background: linear-gradient(to bottom, var(--petal-2), transparent);
  margin: 0 auto; animation: lineGrow 2s ease-in-out infinite;
}
@keyframes lineGrow {
  0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
  50% { transform: scaleY(1); opacity: 1; }
}

/* ── 공통 섹션 ── */
section {
  padding: 60px 32px;
  position: relative;
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
section.visible { opacity: 1; transform: translateY(0); }

.section-head {
  text-align: center; margin-bottom: 36px;
}
.section-head .en {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 11px; letter-spacing: 5px; color: var(--petal-2);
  text-transform: uppercase; display: block; margin-bottom: 6px;
}
.section-head .ko {
  font-size: 16px; letter-spacing: 3px; color: var(--ink-mid);
}

/* 섹션 구분 꽃 */
.floral-sep {
  text-align: center; padding: 8px 0;
  color: var(--petal-2); font-size: 22px; letter-spacing: 6px;
  opacity: 0.7;
}

/* ── 인사말 ── */
.greeting { text-align: center; }
.greeting p {
  font-size: 14.5px; line-height: 2.5;
  color: var(--ink-mid); word-break: keep-all;
}

/* ── 혼주 ── */
.parents-wrap {
  border: 1px solid var(--line);
  padding: 28px 20px;
  text-align: center;
  position: relative;
  background: linear-gradient(135deg, rgba(242,196,206,0.08), rgba(247,230,211,0.12));
}
/* 코너 장미 */
.parents-wrap::before, .parents-wrap::after {
  font-size: 20px; position: absolute; color: var(--petal-2); opacity: 0.5;
}
.parents-wrap::before { content: '🌸'; top: 10px; left: 12px; }
.parents-wrap::after  { content: '🌸'; bottom: 10px; right: 12px; }

.parents-grid {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 12px; align-items: center;
}
.parents-grid .vline {
  width: 1px; height: 56px;
  background: linear-gradient(to bottom, transparent, var(--line), transparent);
  margin: 0 auto;
}
.p-role {
  display: block; font-size: 10px; letter-spacing: 2px;
  color: var(--ink-light); margin-bottom: 4px;
  font-family: 'Playfair Display', serif; font-style: italic;
}
.p-names { font-size: 13px; color: var(--ink-mid); line-height: 2.2; }
.couple-line {
  margin-top: 20px; font-family: 'Playfair Display', serif;
  font-size: 20px; color: var(--ink);
}
.couple-line em { font-style: italic; color: var(--petal-3); margin: 0 10px; }

/* ── D-Day ── */
.dday-section {
  background: linear-gradient(160deg, #f9e8ef 0%, #fce4f0 50%, #f5e8f5 100%);
  text-align: center;
  padding: 64px 32px;
  position: relative; overflow: hidden;
}
.dday-section::before {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='%23f2c4ce' opacity='0.4'/%3E%3C/svg%3E") repeat;
  pointer-events: none;
}
.dday-num {
  font-family: 'Playfair Display', serif;
  font-size: 100px; font-weight: 400; line-height: 0.9;
  color: var(--petal-3); position: relative;
  margin: 12px 0 6px;
}
.dday-num small { font-size: 40px; vertical-align: middle; font-style: italic; }
.dday-sub {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 13px; letter-spacing: 3px; color: var(--ink-light);
  margin-bottom: 14px;
}
.dday-date-text { font-size: 13px; color: var(--ink-mid); line-height: 2; letter-spacing: 1px; }

/* ── 갤러리 ── */
.gallery-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px; margin-top: 8px;
}
.gallery-grid .full { grid-column: 1 / -1; }
.gallery-item {
  aspect-ratio: 1; overflow: hidden;
  background: var(--line); position: relative; cursor: pointer;
}
.gallery-item.tall { aspect-ratio: 2/3; }
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s; position: relative; z-index: 1;
}
.gallery-item:active img { transform: scale(1.04); }
.gallery-item::after {
  content: attr(data-label);
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-light); font-size: 11px; letter-spacing: 2px;
  font-family: 'Playfair Display', serif; font-style: italic;
}
.gallery-item img { position: relative; z-index: 1; }

/* Lightbox */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(45,31,38,0.95); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox img { max-width: 95vw; max-height: 90svh; object-fit: contain; }
.lightbox-close {
  position: absolute; top: 20px; right: 20px;
  background: none; border: 1px solid rgba(242,196,206,0.4);
  color: var(--petal-1); width: 36px; height: 36px;
  border-radius: 50%; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── 위치 ── */
.map-wrap { margin: 16px 0; }
.map-box {
  width: 100%; height: 230px;
  border: 1px solid var(--line); overflow: hidden;
  position: relative;
}
.map-box iframe { width: 100%; height: 100%; border: none; }
.loc-name {
  font-family: 'Playfair Display', serif; font-size: 22px;
  color: var(--ink); margin-bottom: 6px;
}
.loc-addr { font-size: 12px; color: var(--ink-light); line-height: 2; }

.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn {
  flex: 1; padding: 13px 0;
  border: 1px solid var(--petal-2); background: none;
  color: var(--petal-3); font-size: 12px; letter-spacing: 1px;
  cursor: pointer; font-family: 'Noto Serif KR', serif;
  transition: all 0.2s; border-radius: 2px;
}
.btn:active, .btn:hover { background: var(--petal-3); color: #fff; border-color: var(--petal-3); }
.btn.primary { background: var(--petal-3); color: #fff; border-color: var(--petal-3); }

/* ── 계좌번호 ── */
.account-note {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 13px; color: var(--ink-light); text-align: center;
  line-height: 2.2; margin-bottom: 24px;
}
.account-card {
  border: 1px solid var(--line); padding: 20px;
  margin-bottom: 10px; border-radius: 2px;
  background: linear-gradient(135deg, rgba(242,196,206,0.06), transparent);
  position: relative;
}
.account-card::after {
  content: '✿'; position: absolute;
  top: 12px; right: 14px; font-size: 14px;
  color: var(--petal-1); opacity: 0.6;
}
.account-role {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 11px; letter-spacing: 3px; color: var(--petal-2); margin-bottom: 8px;
}
.account-row { display: flex; justify-content: space-between; align-items: center; }
.account-name { font-size: 16px; margin-bottom: 3px; }
.account-num { font-size: 12px; color: var(--ink-light); letter-spacing: 0.5px; }
.copy-btn {
  background: none; border: 1px solid var(--line);
  padding: 5px 14px; font-size: 11px; color: var(--ink-light);
  cursor: pointer; border-radius: 2px; white-space: nowrap;
  font-family: 'Playfair Display', serif; font-style: italic;
  transition: all 0.2s;
}
.copy-btn:active { background: var(--petal-3); color: #fff; border-color: var(--petal-3); }

/* ── 푸터 ── */
footer {
  text-align: center; padding: 48px 32px 80px;
  position: relative; overflow: hidden;
}
.footer-text {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 15px; color: var(--ink-light); letter-spacing: 3px; margin-bottom: 12px;
}
.footer-flowers { font-size: 24px; letter-spacing: 8px; opacity: 0.6; }

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--petal-1);
  padding: 10px 24px; border-radius: 24px;
  font-size: 13px; opacity: 0; transition: all 0.3s;
  z-index: 9998; white-space: nowrap;
  font-family: 'Playfair Display', serif; font-style: italic;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

</section>

<!-- ── 위치 ── -->
<div class="floral-sep">✿ ❀ ✿</div>
<section id="sec5">
  <div class="section-head">
    <span class="en">Location</span>
    <span class="ko">오 시 는 길</span>
  </div>
  <div class="loc-name" id="locName"></div>
  <div class="loc-addr" id="locAddr"></div>
  <div class="map-wrap">
    <div class="map-box" id="mapBox"></div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="openKakao()">카카오맵</button>
    <button class="btn" onclick="openNaver()">네이버맵</button>
    <button class="btn primary" onclick="openTmap()">T맵</button>
  </div>
</section>

<!-- ── 계좌번호 ── -->
<div class="floral-sep">✿ ❀ ✿</div>
<section id="sec6">
  <div class="section-head">
    <span class="en">Account</span>
    <span class="ko">마 음 전 하 기</span>
  </div>
  <p class="account-note">
    함께해 주시는 것만으로도<br>
    더없이 행복하겠습니다
  </p>
  <div id="accountBox"></div>
</section>

<!-- ── 푸터 ── -->
<div class="floral-sep">✿ ❀ ✿</div>
<footer>
  <div class="footer-flowers">🌸 🌷 🌸</div>
  <br>
  <div class="footer-text">with love & flowers</div>
</footer>

</div><!-- .page -->

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ================================================
// ✏️ 개인정보 수정하세요
// ================================================
const INFO = {
  groomName:   "홍길동",
  brideName:   "김영희",
  groomFather: "홍판서",
  groomMother: "춘향모",
  brideFather: "김철수",
  brideMother: "이영자",

  // ✏️ new Date(년, 월-1, 일, 시, 분)
  weddingDate:     new Date(2025, 5, 14, 14, 0),
  weddingDateText: "2025년 6월 14일 토요일 오후 2시",

  place:   "그랜드 볼룸 웨딩홀",
  address: "서울특별시 강남구 테헤란로 123",

  groomAccount: "카카오뱅크 3333-12-3456789",
  brideAccount:  "신한은행 110-123-456789",

  greeting: `저희 두 사람이\n사랑으로 하나가 되는 날,\n함께 자리하여 축복해 주시면\n더없이 기쁘겠습니다.\n\n소중한 걸음으로 찾아주실\n여러분을 기다립니다.`,
};

// ── 렌더링 ──
document.getElementById('coverGroom').textContent  = INFO.groomName;
document.getElementById('coverBride').textContent  = INFO.brideName;
document.getElementById('coverDate').innerHTML     = INFO.weddingDateText.replace(/\s(?=\d{2}시)/, '<br>');
document.getElementById('greetingText').innerHTML  = INFO.greeting.replace(/\n/g, '<br>');
document.getElementById('locName').textContent     = INFO.place;
document.getElementById('locAddr').textContent     = INFO.address;
document.getElementById('ddayDate').textContent    = INFO.weddingDateText;

// 혼주
document.getElementById('parentsBox').innerHTML = `
  <div class="parents-grid">
    <div style="text-align:right">
      <span class="p-role">신랑측 부</span>
      <div class="p-names">${INFO.groomFather}<br>${INFO.groomMother}</div>
    </div>
    <div class="vline"></div>
    <div style="text-align:left">
      <span class="p-role">신부측 부</span>
      <div class="p-names">${INFO.brideFather}<br>${INFO.brideMother}</div>
    </div>
  </div>
  <div class="couple-line">${INFO.groomName}<em>&</em>${INFO.brideName}</div>
`;

// 계좌
document.getElementById('accountBox').innerHTML = `
  <div class="account-card">
    <div class="account-role">Groom · 신랑</div>
    <div class="account-row">
      <div>
        <div class="account-name">${INFO.groomName}</div>
        <div class="account-num">${INFO.groomAccount}</div>
      </div>
      <button class="copy-btn" onclick="copyAccount('${INFO.groomAccount}')">복사</button>
    </div>
  </div>
  <div class="account-card">
    <div class="account-role">Bride · 신부</div>
    <div class="account-row">
      <div>
        <div class="account-name">${INFO.brideName}</div>
        <div class="account-num">${INFO.brideAccount}</div>
      </div>
      <button class="copy-btn" onclick="copyAccount('${INFO.brideAccount}')">복사</button>
    </div>
  </div>
`;

// ── D-day ──
(function() {
  const today  = new Date(); today.setHours(0,0,0,0);
  const target = new Date(INFO.weddingDate); target.setHours(0,0,0,0);
  const diff   = Math.ceil((target - today) / 86400000);
  const el = document.getElementById('ddayNum');
  if (diff === 0)     el.parentElement.innerHTML = `<div class="dday-num" style="font-size:64px;font-style:italic">D-Day</div>`;
  else if (diff < 0)  el.textContent = `+${Math.abs(diff)}`;
  else                el.textContent = diff;
})();

// ── 구글맵 ──
(function() {
  const q = encodeURIComponent(INFO.address);
  document.getElementById('mapBox').innerHTML =
    `<iframe src="https://maps.google.com/maps?q=${q}&output=embed" allowfullscreen></iframe>`;
})();

function openKakao() { window.open(`https://map.kakao.com/link/search/${encodeURIComponent(INFO.place)}`, '_blank'); }
function openNaver() { window.open(`https://map.naver.com/v5/search/${encodeURIComponent(INFO.address)}`, '_blank'); }
function openTmap()  { window.open(`https://tmap.life/route?goalname=${encodeURIComponent(INFO.place)}`, '_blank'); }

// ── 계좌 복사 ──
function copyAccount(text) {
  const num = text.match(/[\d\-]+/)?.[0] || text;
  navigator.clipboard.writeText(num).then(() => showToast('계좌번호가 복사되었습니다 🌸'));
}

// ── 토스트 ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 갤러리 ──
document.querySelectorAll('.gallery-item img').forEach(img => {
  img.addEventListener('click', () => {
    document.getElementById('lightboxImg').src = img.src;
    document.getElementById('lightbox').classList.add('open');
  });
});
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});

// ── 꽃잎 낙하 ──
(function() {
  const container = document.getElementById('petals');
  const colors = ['#f2c4ce','#e8a4b8','#f7e6d3','#d4789a','#fce8ef'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    const size = 6 + Math.random() * 10;
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${-20 - Math.random() * 40}px;
      width: ${size}px;
      height: ${size * 1.4}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: 50% 10% 50% 10%;
      animation-duration: ${6 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 8}s;
    `;
    container.appendChild(el);
  }
})();

// ── 스크롤 애니메이션 ──
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.08 });
document.querySelectorAll('section').forEach(s => obs.observe(s));
</script>
</body>
</html>
